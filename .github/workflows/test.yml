name: Run Unit Tests

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    name: Run Tests

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Run Tests
      run: dotnet test src --no-build --verbosity normal --collect "Code Coverage;Format=cobertura"
